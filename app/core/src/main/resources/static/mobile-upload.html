<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#c02223">
    <meta name="robots" content="noindex">
    <title>RyanPDF - Mobile Upload</title>

    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="shortcut icon" href="favicon.ico">

    <style>
        :root {
            --brand: #c02223;
            --brand-dark: #882425;
            --bg: #f3f4f6;
            --card: #ffffff;
            --text: #111827;
            --text-dim: #6b7280;
            --border: #e5e7eb;
            --tile: #f9fafb;
            --tile-hover: #f1f3f5;
            --success: #16a34a;
            --danger: #dc2626;
            --shadow: 0 1.25rem 3rem rgba(0, 0, 0, 0.12);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f1115;
                --card: #1a1d23;
                --text: #f3f4f6;
                --text-dim: #9ca3af;
                --border: #2c303a;
                --tile: #22262e;
                --tile-hover: #2a2f38;
                --shadow: 0 1.25rem 3rem rgba(0, 0, 0, 0.5);
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: env(safe-area-inset-top) 1rem 1.5rem;
        }

        .wrap {
            width: 100%;
            max-width: 30rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin: auto;
        }

        header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1.5rem 0 0.25rem;
            justify-content: center;
        }

        header .logo {
            width: 2.75rem;
            height: 2.75rem;
            flex: none;
        }

        header .titles {
            display: flex;
            flex-direction: column;
            line-height: 1.15;
        }

        header .wordmark {
            height: 1.5rem;
            width: auto;
            display: block;
            color: var(--text);
        }

        header .subtitle {
            font-size: 0.8rem;
            color: var(--text-dim);
            font-weight: 500;
        }

        .card {
            background-color: var(--card);
            border-radius: 1.25rem;
            box-shadow: var(--shadow);
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-size: 0.85rem;
            padding: 0.7rem 0.85rem;
            border-radius: 0.75rem;
            background: var(--tile);
            color: var(--text-dim);
        }

        .status .dot {
            width: 0.6rem;
            height: 0.6rem;
            border-radius: 50%;
            background: var(--text-dim);
            flex: none;
        }

        .status.ok { color: var(--success); }
        .status.ok .dot { background: var(--success); }
        .status.err { color: var(--danger); }
        .status.err .dot { background: var(--danger); }

        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
        }

        .tile {
            border: 1px solid var(--border);
            background: var(--tile);
            color: var(--text);
            border-radius: 1rem;
            padding: 1.1rem 0.75rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s, transform 0.08s;
        }

        .tile:active { transform: scale(0.97); }
        .tile:hover { background: var(--tile-hover); }
        .tile svg { width: 1.9rem; height: 1.9rem; color: var(--brand); }
        .tile:disabled { opacity: 0.5; cursor: not-allowed; }

        .files {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .file {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            background: var(--tile);
            border-radius: 0.75rem;
            padding: 0.5rem 0.6rem;
        }

        .file .thumb {
            width: 2.75rem;
            height: 2.75rem;
            border-radius: 0.5rem;
            object-fit: cover;
            background: var(--border);
            flex: none;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-dim);
            overflow: hidden;
        }

        .file .thumb svg { width: 1.3rem; height: 1.3rem; }

        .file .meta {
            flex: 1;
            min-width: 0;
        }

        .file .name {
            font-size: 0.85rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file .size {
            font-size: 0.72rem;
            color: var(--text-dim);
        }

        .file .remove {
            border: none;
            background: transparent;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 1.4rem;
            line-height: 1;
            padding: 0 0.3rem;
            flex: none;
        }

        .file .remove:hover { color: var(--danger); }

        .btn {
            border: none;
            border-radius: 0.85rem;
            padding: 0.95rem 1rem;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            background: var(--brand);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: filter 0.15s, transform 0.08s;
        }

        .btn:active { transform: scale(0.99); }
        .btn:hover { filter: brightness(1.05); }
        .btn:disabled { opacity: 0.55; cursor: not-allowed; filter: none; }

        .progress {
            height: 0.5rem;
            border-radius: 999px;
            background: var(--border);
            overflow: hidden;
        }

        .progress > span {
            display: block;
            height: 100%;
            width: 0%;
            background: var(--brand);
            transition: width 0.2s ease;
        }

        .done {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 0.75rem;
            padding: 0.5rem 0;
        }

        .done .check {
            width: 3.5rem;
            height: 3.5rem;
            border-radius: 50%;
            background: var(--success);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .done .check svg { width: 2rem; height: 2rem; }
        .done h2 { font-size: 1.15rem; }
        .done p { font-size: 0.88rem; color: var(--text-dim); }

        .hint {
            font-size: 0.78rem;
            color: var(--text-dim);
            text-align: center;
            line-height: 1.4;
        }

        .hidden { display: none !important; }

        footer {
            text-align: center;
            font-size: 0.72rem;
            color: var(--text-dim);
            padding-top: 0.25rem;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <header>
            <svg class="logo" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <linearGradient id="lg" x1="223" x2="241" y1="372" y2="114" gradientUnits="userSpaceOnUse">
                    <stop offset="0" stop-color="#dcf1f3"/><stop offset="1" stop-color="#c2c2c9"/>
                </linearGradient>
                <path fill="#c02223" d="M347 14 99 69c-25 6-43 28-43 54v315c0 22 17 41 39 44l130 16 115-114 116-119-2-180c0-22-20-38-42-34l-29 7 0-14C383 25 366 10 347 14Z"/>
                <path fill="#882425" d="M383 57v286l73-78-2-186c0-19-18-33-36-29Z"/>
                <path fill="url(#lg)" d="M283 215s-22-29-39-37c-10-5-26-7-38-1-18 9-20 34-3 44 4 2 9 5 16 6 37 8 97 26 90 96 0 0-4 66-74 73-12 1-25 0-36-2-16-4-46-11-60-20l-3-75h7s14 33 53 50c7 3 15 4 23 3 10-1 21-7 26-23 0 0 8-23-33-36-33-10-63-21-76-55-6-16-7-34-3-52 5-22 21-54 64-68 0 0 57-16 97 6l-2 90Z"/>
            </svg>
            <div class="titles">
                <svg class="wordmark" viewBox="0 0 118 26" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="RyanPDF">
                    <text x="0" y="20" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="20" fill="currentColor">RyanPDF</text>
                </svg>
                <div class="subtitle">Mobile Upload</div>
            </div>
        </header>

        <div class="card" id="uploader">
            <div class="status" id="status"><span class="dot"></span><span id="statusText">Connecting&hellip;</span></div>

            <div class="actions">
                <button class="tile" id="cameraBtn" type="button" disabled>
                    <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M9 3 7.2 5H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-3.2L15 3H9Zm3 5a5 5 0 1 1 0 10 5 5 0 0 1 0-10Zm0 2a3 3 0 1 0 0 6 3 3 0 0 0 0-6Z"/></svg>
                    Take Photo
                </button>
                <button class="tile" id="fileBtn" type="button" disabled>
                    <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M5 20h14a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7l-2-2H5a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2Zm7-3-3.5-4.5h2.25V9h2.5v3.5H17.5L13 17Z"/></svg>
                    Choose Files
                </button>
            </div>

            <input id="cameraInput" class="hidden" type="file" accept="image/*" capture="environment" multiple>
            <input id="fileInput" class="hidden" type="file" accept="image/*,application/pdf" multiple>

            <div class="files" id="fileList"></div>

            <button class="btn" id="uploadBtn" type="button" disabled>Upload</button>

            <div class="progress hidden" id="progressWrap"><span id="progressBar"></span></div>

            <p class="hint" id="hint">Add photos or files, then upload. They appear on your computer automatically.</p>
        </div>

        <div class="card hidden" id="successCard">
            <div class="done">
                <div class="check">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m5 13 4 4L19 7"/></svg>
                </div>
                <h2 id="successTitle">Sent!</h2>
                <p id="successText">Your files are now on your computer.</p>
            </div>
        </div>

        <footer>RyanPDF &middot; files transfer directly to your desktop</footer>
    </div>

    <script>
        (function () {
            "use strict";

            var API_BASE = new URL(".", window.location.href).href;

            var params = new URLSearchParams(window.location.search);
            var sessionId = (params.get("session") || "").trim();
            var SESSION_RE = /^[A-Za-z0-9-]{8,128}$/;

            var els = {
                status: document.getElementById("status"),
                statusText: document.getElementById("statusText"),
                cameraBtn: document.getElementById("cameraBtn"),
                fileBtn: document.getElementById("fileBtn"),
                cameraInput: document.getElementById("cameraInput"),
                fileInput: document.getElementById("fileInput"),
                fileList: document.getElementById("fileList"),
                uploadBtn: document.getElementById("uploadBtn"),
                progressWrap: document.getElementById("progressWrap"),
                progressBar: document.getElementById("progressBar"),
                hint: document.getElementById("hint"),
                uploader: document.getElementById("uploader"),
                successCard: document.getElementById("successCard"),
                successText: document.getElementById("successText")
            };

            var selected = [];
            var sessionReady = false;

            function setStatus(text, kind) {
                els.statusText.textContent = text;
                els.status.className = "status" + (kind ? " " + kind : "");
            }

            function enableInputs(on) {
                sessionReady = on;
                els.cameraBtn.disabled = !on;
                els.fileBtn.disabled = !on;
                refreshUploadBtn();
            }

            function refreshUploadBtn() {
                els.uploadBtn.disabled = !sessionReady || selected.length === 0;
                els.uploadBtn.textContent =
                    selected.length > 0 ? "Upload " + selected.length + " file" + (selected.length > 1 ? "s" : "") : "Upload";
            }

            function formatSize(bytes) {
                if (bytes < 1024) return bytes + " B";
                if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(0) + " KB";
                return (bytes / (1024 * 1024)).toFixed(1) + " MB";
            }

            var FILE_ICON =
                '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6Zm0 2 4 4h-4V4Z"/></svg>';

            function renderFiles() {
                els.fileList.innerHTML = "";
                selected.forEach(function (file, idx) {
                    var row = document.createElement("div");
                    row.className = "file";

                    var thumb = document.createElement("div");
                    thumb.className = "thumb";
                    if (file.type && file.type.indexOf("image/") === 0) {
                        var img = document.createElement("img");
                        img.style.width = "100%";
                        img.style.height = "100%";
                        img.style.objectFit = "cover";
                        img.alt = "";
                        img.src = URL.createObjectURL(file);
                        img.onload = function () { URL.revokeObjectURL(img.src); };
                        thumb.appendChild(img);
                    } else {
                        thumb.innerHTML = FILE_ICON;
                    }

                    var meta = document.createElement("div");
                    meta.className = "meta";
                    var name = document.createElement("div");
                    name.className = "name";
                    name.textContent = file.name || "image.jpg";
                    var size = document.createElement("div");
                    size.className = "size";
                    size.textContent = formatSize(file.size);
                    meta.appendChild(name);
                    meta.appendChild(size);

                    var remove = document.createElement("button");
                    remove.className = "remove";
                    remove.type = "button";
                    remove.setAttribute("aria-label", "Remove");
                    remove.innerHTML = "&times;";
                    remove.onclick = function () {
                        selected.splice(idx, 1);
                        renderFiles();
                        refreshUploadBtn();
                    };

                    row.appendChild(thumb);
                    row.appendChild(meta);
                    row.appendChild(remove);
                    els.fileList.appendChild(row);
                });
            }

            function addFiles(fileList) {
                for (var i = 0; i < fileList.length; i++) {
                    selected.push(fileList[i]);
                }
                renderFiles();
                refreshUploadBtn();
            }

            els.cameraBtn.onclick = function () { els.cameraInput.click(); };
            els.fileBtn.onclick = function () { els.fileInput.click(); };
            els.cameraInput.onchange = function (e) { addFiles(e.target.files); e.target.value = ""; };
            els.fileInput.onchange = function (e) { addFiles(e.target.files); e.target.value = ""; };

            els.uploadBtn.onclick = function () {
                if (!sessionReady || selected.length === 0) return;
                upload();
            };

            function upload() {
                var form = new FormData();
                selected.forEach(function (file) { form.append("files", file, file.name); });

                var xhr = new XMLHttpRequest();
                xhr.open("POST", API_BASE + "api/v1/mobile-scanner/upload/" + encodeURIComponent(sessionId));

                els.uploadBtn.disabled = true;
                els.cameraBtn.disabled = true;
                els.fileBtn.disabled = true;
                els.progressWrap.classList.remove("hidden");
                els.progressBar.style.width = "0%";

                xhr.upload.onprogress = function (e) {
                    if (e.lengthComputable) {
                        els.progressBar.style.width = Math.round((e.loaded / e.total) * 100) + "%";
                    }
                };

                xhr.onload = function () {
                    els.progressWrap.classList.add("hidden");
                    if (xhr.status >= 200 && xhr.status < 300) {
                        var count = selected.length;
                        els.successText.textContent =
                            count + " file" + (count > 1 ? "s are" : " is") + " now on your computer.";
                        els.uploader.classList.add("hidden");
                        els.successCard.classList.remove("hidden");
                    } else {
                        var msg = "Upload failed. Please try again.";
                        if (xhr.status === 403) msg = "Mobile upload is not enabled on this server.";
                        else if (xhr.status === 400) msg = "Session expired. Re-scan the QR code.";
                        setStatus(msg, "err");
                        els.cameraBtn.disabled = false;
                        els.fileBtn.disabled = false;
                        refreshUploadBtn();
                    }
                };

                xhr.onerror = function () {
                    els.progressWrap.classList.add("hidden");
                    setStatus("Network error. Stay on the same Wi-Fi and try again.", "err");
                    els.cameraBtn.disabled = false;
                    els.fileBtn.disabled = false;
                    refreshUploadBtn();
                };

                xhr.send(form);
            }

            function init() {
                if (!sessionId || !SESSION_RE.test(sessionId)) {
                    setStatus("Invalid link. Re-scan the QR code on your computer.", "err");
                    return;
                }
                setStatus("Connecting&hellip;");
                fetch(API_BASE + "api/v1/mobile-scanner/validate-session/" + encodeURIComponent(sessionId))
                    .then(function (res) {
                        if (res.ok) {
                            return res.json().then(function (data) {
                                if (data && data.valid) {
                                    setStatus("Connected to your computer", "ok");
                                    enableInputs(true);
                                } else {
                                    setStatus("Session expired. Re-scan the QR code.", "err");
                                }
                            });
                        }
                        if (res.status === 403) {
                            setStatus("Mobile upload is not enabled on this server.", "err");
                        } else {
                            setStatus("Session not found. Re-scan the QR code.", "err");
                        }
                    })
                    .catch(function () {
                        setStatus("Can't reach your computer. Stay on the same Wi-Fi.", "err");
                    });
            }

            init();
        })();
    </script>
</body>
</html>
