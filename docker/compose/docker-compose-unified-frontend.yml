# Example Docker Compose for Unified RyanPDF Container
# MODE=FRONTEND: Frontend only, connects to separate backend

services:
  ryanpdf-backend:
    container_name: RyanPDF-Backend
    build:
      context: ../..
      dockerfile: docker/Dockerfile.unified
    ports:
      - "8081:8080"
    volumes:
      - ./ryanpdf/data:/usr/share/tessdata:rw
      - ./ryanpdf/config:/configs:rw
      - ./ryanpdf/logs:/logs:rw
      - ./ryanpdf/customFiles:/customFiles:rw
      - ./ryanpdf/pipeline:/pipeline:rw
    environment:
      MODE: BACKEND
      DISABLE_ADDITIONAL_FEATURES: "false"
      DOCKER_ENABLE_SECURITY: "false"
      PUID: 1000
      PGID: 1000
      UMASK: "022"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080$${SYSTEM_ROOTURIPATH:-''}/api/v1/info/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 4G

  ryanpdf-frontend:
    container_name: RyanPDF-Frontend
    build:
      context: ../..
      dockerfile: docker/Dockerfile.unified
    ports:
      - "8080:8080"
    environment:
      MODE: FRONTEND

      # Point to the backend service
      VITE_API_BASE_URL: http://ryanpdf-backend:8080

      # Minimal config needed for frontend
      PUID: 1000
      PGID: 1000
    depends_on:
      - ryanpdf-backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
