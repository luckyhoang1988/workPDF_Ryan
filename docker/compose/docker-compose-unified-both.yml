# Example Docker Compose for Unified RyanPDF Container
# MODE=BOTH (default): Frontend + Backend in single container on port 8080

services:
  ryanpdf-unified:
    container_name: RyanPDF-Unified-Both
    build:
      context: ../..
      dockerfile: docker/Dockerfile.unified
    ports:
      - "8080:8080"
    volumes:
      - ./ryanpdf/data:/usr/share/tessdata:rw
      - ./ryanpdf/config:/configs:rw
      - ./ryanpdf/logs:/logs:rw
      - ./ryanpdf/customFiles:/customFiles:rw
      - ./ryanpdf/pipeline:/pipeline:rw
    environment:
      # MODE parameter: BOTH (default), FRONTEND, or BACKEND
      MODE: BOTH

      # Backend runs internally on this port when MODE=BOTH
      BACKEND_INTERNAL_PORT: 8081

      # Standard RyanPDF configuration
      DISABLE_ADDITIONAL_FEATURES: "false"
      DOCKER_ENABLE_SECURITY: "false"
      PUID: 1000
      PGID: 1000
      UMASK: "022"

      # Application settings
      SYSTEM_DEFAULTLOCALE: en-US
      UI_APPNAME: RyanPDF
      UI_HOMEDESCRIPTION: Your locally hosted one-stop-shop for all your PDF needs
      SYSTEM_MAXFILESIZE: "100"
      METRICS_ENABLED: "true"

      # Optional: Add OCR languages (comma-separated)
      # TESSERACT_LANGS: "deu,fra,spa"

      # Optional: Java memory settings
      # JAVA_CUSTOM_OPTS: "-Xmx4g"

    restart: unless-stopped

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080$${SYSTEM_ROOTURIPATH:-''}/api/v1/info/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
