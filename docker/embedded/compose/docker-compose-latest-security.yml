services:
  ryanpdf:
    container_name: RyanPDF-Security
    build:
      context: ../../..
      dockerfile: docker/embedded/Dockerfile
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080$${SYSTEM_ROOTURIPATH:-''}/api/v1/info/status | grep -q 'UP'"]
      interval: 5s
      timeout: 10s
      retries: 16
    ports:
      - 8080:8080
    volumes:
      - ../../../ryanpdf/latest/data:/usr/share/tessdata:rw
      - ../../../ryanpdf/latest/config:/configs:rw
      - ../../../ryanpdf/latest/logs:/logs:rw
    environment:
      DISABLE_ADDITIONAL_FEATURES: "false"
      SECURITY_ENABLELOGIN: "false"
      PROCESS_EXECUTOR_AUTO_UNO_SERVER: "true"
      PROCESS_EXECUTOR_SESSION_LIMIT_LIBRE_OFFICE_SESSION_LIMIT: "1"
      # STIRLING_JVM_PROFILE: "balanced"  # Options: balanced (G1GC, default), performance (Shenandoah)
      # JAVA_CUSTOM_OPTS: ""              # Additional JVM flags appended to the active profile
      PUID: 1002
      PGID: 1002
      UMASK: "022"
      SYSTEM_DEFAULTLOCALE: en-US
      UI_APPNAME: RyanPDF
      UI_HOMEDESCRIPTION: Demo site for RyanPDF Latest with Security
      UI_APPNAMENAVBAR: RyanPDF Latest
      SYSTEM_MAXFILESIZE: "100"
      METRICS_ENABLED: "true"
      SYSTEM_GOOGLEVISIBILITY: "true"
      SHOW_SURVEY: "true"
    restart: on-failure:5
