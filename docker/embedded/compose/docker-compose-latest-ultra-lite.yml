services:
  ryanpdf:
    container_name: RyanPDF-Ultra-Lite
    build:
      context: ../../../
      dockerfile: docker/embedded/Dockerfile.ultra-lite
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080$${SYSTEM_ROOTURIPATH:-''}/api/v1/info/status | grep -q 'UP' && curl -fL http://localhost:8080/ | grep -qv 'Please sign in'"]
      interval: 5s
      timeout: 10s
      retries: 16
    ports:
      - "8080:8080"
    volumes:
      - ../../../ryanpdf/latest/config:/configs:rw
      - ../../../ryanpdf/latest/logs:/logs:rw
    environment:
      SECURITY_ENABLELOGIN: "false"
      # STIRLING_JVM_PROFILE: "balanced"  # Options: balanced (G1GC, default), performance (Shenandoah)
      # JAVA_CUSTOM_OPTS: ""              # Additional JVM flags appended to the active profile
      SYSTEM_DEFAULTLOCALE: en-US
      UI_APPNAME: RyanPDF-Ultra-lite
      UI_HOMEDESCRIPTION: Demo site for RyanPDF-Ultra-lite Latest
      UI_APPNAMENAVBAR: RyanPDF-Ultra-lite Latest
      SYSTEM_MAXFILESIZE: "100"
      METRICS_ENABLED: "true"
      SYSTEM_GOOGLEVISIBILITY: "true"
      SHOW_SURVEY: "true"
    restart: unless-stopped
