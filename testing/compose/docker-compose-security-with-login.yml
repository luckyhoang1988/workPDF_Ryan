services:
  ryanpdf:
    build:
      context: ../..
      dockerfile: docker/embedded/Dockerfile
    container_name: RyanPDF-Security-with-login
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080$${SYSTEM_ROOTURIPATH:-''}/api/v1/info/status | grep -q 'UP'"]
      interval: 5s
      timeout: 10s
      retries: 16
    ports:
      - "8080:8080"
    volumes:
      - ../../ryanpdf/latest/data:/usr/share/tessdata:rw
      - ../../ryanpdf/latest/config:/configs:rw
      - ../../ryanpdf/latest/logs:/logs:rw
    environment:
      DISABLE_ADDITIONAL_FEATURES: "false"
      DOCKER_ENABLE_SECURITY: "true"
      SECURITY_ENABLELOGIN: "true"
      SECURITY_INITIALLOGIN_USERNAME: "admin"
      SECURITY_INITIALLOGIN_PASSWORD: "stirling"
      SYSTEM_DEFAULTLOCALE: en-US
      UI_APPNAME: RyanPDF
      UI_HOMEDESCRIPTION: Demo site for RyanPDF Latest with Security and Login
      UI_APPNAMENAVBAR: RyanPDF Latest
      SYSTEM_MAXFILESIZE: "100"
      METRICS_ENABLED: "true"
      SYSTEM_GOOGLEVISIBILITY: "true"
      SECURITY_CUSTOMGLOBALAPIKEY: "123456789"
      SHOW_SURVEY: "true"
    networks:
      - ryanpdf-network

networks:
  ryanpdf-network:
    driver: bridge

volumes:
  ryanpdf-data:
  ryanpdf-config:
  ryanpdf-logs:
